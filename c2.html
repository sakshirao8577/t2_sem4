<form action="/next" method="post">
    <h1> Feedback Form </h1>
    <label> Name: </label>
    <input type="text" name="name"> <br><br>
    <label> Email: </label>
    <input type="email" name="email"> <br><br>
    <label> Message: </label>
    <textarea name="msg"></textarea> <br><br>
    <input type="radio" id="r1" name="rating" required value="bad">
    <label for="r1">Bad</label>
    <input type="radio" id="r2" name="rating" required value="average">
    <label for="r2">Average</label>
    <input type="radio" id="r3" name="rating" required value="good">
    <label for="r3">Good</label>
    <input type="radio" id="r4" name="rating" required value="vary good">
    <label for="r4">Very Good</label>
    <input type="radio" id="r5" name="rating" required value="Excellent">
    <label for="r5">Excellent</label>
    <input type="submit">
</form>
